<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>タブ音声レコーダー 設定</title>
    <style>
      body {
        font-family: -apple-system, "Hiragino Kaku Gothic ProN", sans-serif;
        max-width: 460px;
        margin: 40px auto;
        padding: 0 20px;
        color: #222;
        line-height: 1.6;
      }
      h1 { font-size: 18px; }
      .row { margin: 18px 0; }
      label.line { display: flex; align-items: center; gap: 8px; font-size: 14px; }
      .hint { font-size: 12px; color: #888; margin-top: 4px; }
      select, input[type="number"] { font-size: 14px; padding: 4px 6px; }
      #saved { color: #188038; font-size: 13px; height: 18px; }
      .card { border: 1px solid #eee; border-radius: 10px; padding: 16px 18px; }
      .steps { font-size: 13px; color: #555; background: #f7f7f7; border-radius: 8px; padding: 12px 16px; }
    </style>
  </head>
  <body>
    <h1>タブ音声レコーダー 設定</h1>

    <div class="steps">
      使い方: 音声を再生しているタブで <b>拡張アイコンをクリック</b> → 録音開始。
      もう一度クリックで停止・保存します。ここの設定は次回の録音から反映されます。
    </div>

    <div class="card" style="margin-top:16px">
      <div class="row">
        <label class="line">
          <input type="checkbox" id="monitor" />
          録音中もタブの音を再生する
        </label>
        <div class="hint">オフにすると、あなたには無音（ミュート）のまま録音できます。</div>
      </div>

      <div class="row">
        <label class="line">
          <input type="number" id="minutes" min="0" step="1" style="width:70px" />
          分後に自動停止
        </label>
        <div class="hint">0 で無制限（手動停止のみ）。</div>
      </div>

      <div class="row">
        <label class="line">
          出力形式
          <select id="format">
            <option value="mp3">MP3</option>
            <option value="webm">WebM (Opus・変換なしで高速)</option>
          </select>
        </label>
      </div>

      <div class="row" id="bitrateRow">
        <label class="line">
          MP3 ビットレート
          <select id="bitrate">
            <option value="128">128 kbps</option>
            <option value="192">192 kbps</option>
            <option value="256">256 kbps</option>
            <option value="320">320 kbps</option>
          </select>
        </label>
      </div>
    </div>

    <div id="saved"></div>
    <script src="options.js"></script>
  </body>
</html>
