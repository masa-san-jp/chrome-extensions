<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 240px;
        font-family: -apple-system, "Hiragino Kaku Gothic ProN", sans-serif;
        margin: 0;
        padding: 14px;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
      }
      button {
        width: 100%;
        padding: 10px;
        font-size: 14px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        color: #fff;
      }
      #start { background: #d33; }
      #stop { background: #444; }
      button:disabled { opacity: 0.4; cursor: default; }
      .row { margin: 10px 0; }
      label { font-size: 12px; display: flex; align-items: center; gap: 6px; }
      #status { font-size: 12px; color: #666; margin-top: 8px; min-height: 16px; }
      .rec { color: #d33; font-weight: bold; }
      .err { color: #d33; }
    </style>
  </head>
  <body>
    <h1>タブ音声レコーダー</h1>
    <div class="row">
      <label>
        <input type="checkbox" id="monitor" checked />
        録音中もタブの音を再生する
      </label>
      <div style="font-size:11px;color:#999;margin-top:4px;line-height:1.4">
        オフにすると無音（ミュート）のまま録音できます。
      </div>
    </div>
    <div class="row">
      <button id="start">● 録音開始</button>
    </div>
    <div class="row">
      <button id="stop" disabled>■ 停止して保存</button>
    </div>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
